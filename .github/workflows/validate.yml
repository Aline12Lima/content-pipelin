name: Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validate docker-compose
        run: docker compose config

      - name: Check .env.example exists
        run: test -f .env.example

      - name: Check workflow export exists
        run: test -f workflows/sentiment-analysis.json